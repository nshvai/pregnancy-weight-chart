<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#fdfaf6"/>
  <!-- Subtle inner circle for depth -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="#e8637a" stroke-width="1" opacity="0.2"/>
  <!-- Rising curve path (gestational weight trajectory feel) -->
  <path d="M5 22 Q10 20 14 16 Q18 12 24 9" 
        fill="none" stroke="#e8637a" stroke-width="2.2" 
